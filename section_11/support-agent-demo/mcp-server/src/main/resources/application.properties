spring.application.name=mcp-server
server.port=8090

# --- Datasource ---------------------------------------------------------------
# Spring Boot Docker Compose auto-starts compose.yaml and wires these in dev,
# but setting them explicitly keeps the app runnable against any MySQL too.
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

# --- JPA / Hibernate ----------------------------------------------------------
# Schema + data are owned by db/init/*.sql (run by the MySQL container).
# Keep Hibernate read-only on DDL so it never drops/recreates the seeded tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- MCP server ---------------------------------------------------------------
spring.ai.mcp.server.name=support-agent-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.instructions=Tools for an email support agent: look up customers, \
  orders and products; detect duplicate charges; check warranty windows; review ticket \
  history for repeat failures; issue refunds; and log the resolution.
spring.ai.mcp.server.protocol=streamable
