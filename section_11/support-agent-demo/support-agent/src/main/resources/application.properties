spring.application.name=support-agent
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
spring.ai.openai.api-key=${OPENAI_API_KEY}

# ----------------------------------------------------------------------
# Outbound mail (SMTP) - used only to SEED the fake inbox with test emails.
# Points at the Mailpit container from compose.yaml.
# ----------------------------------------------------------------------
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ----------------------------------------------------------------------
# Inbox monitoring (Mailpit REST API) - what the agent watches.
# ----------------------------------------------------------------------
support-agent.inbox.base-url=http://localhost:8025
# Address the agent's mailbox uses (recipient when seeding test mail).
support-agent.inbox.address=support@example.com
# How often to poll the inbox, in milliseconds.
support-agent.inbox.poll-interval=10000
# Max unread messages pulled per poll.
support-agent.inbox.batch-size=50

spring.ai.mcp.client.streamable-http.connections.support-agent.url=http://localhost:8090
spring.ai.mcp.client.streamable-http.connections.support-agent.endpoint=/mcp
